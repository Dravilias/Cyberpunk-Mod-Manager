<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
    <button id="filePicker">Choose mod zip archive</button>
    <script>
        const filePicker = document.getElementById("filePicker");

        filePicker.addEventListener("click", () => {
            window.api.selectModZip().then((path) => {
                if (!path) return;
                window.api.installModFromPath(path).then((modName) => {
                    console.log("Installed:", modName);
                });
            });
        });
    </script>
</body>
</html>
