<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
    <button id="filePicker">Choose mod zip archive</button>
    <ul id="modList"></ul>
    <script>
        const filePicker = document.getElementById("filePicker");
        const modList = document.getElementById("modList");

        function renderModList() {
            modList.innerHTML = "";
            window.api.getInstalledMods().then( records => 
                records.forEach(record => {
                    const li = document.createElement("li")
                    li.textContent = record.name + " ";
                    const button = document.createElement("button");
                    button.textContent = "Delete";
                    button.addEventListener("click", () => {
                        console.log("button clicked for", record.name);
                        window.api.deleteMod(record.name).then(() => {
                            renderModList()
                        })
                    })
                    li.appendChild(button);
                    modList.appendChild(li)
                })
            )
        }
        renderModList()

        
        filePicker.addEventListener("click", async () => {
            const paths = await window.api.selectModZip();
            if (!paths) return;

            for (const path of paths) {
                await window.api.installModFromPath(path);
                console.log("installed " + path);
            }

            renderModList();
        });
    </script>
</body>
</html>
